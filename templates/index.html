<!DOCTYPE html>
<html>
<head>
    <title>Traveloop - Trip Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Traveloop: My Trips</h1>
    
    <form action="/add_trip" method="POST" class="mb-4 mt-4">
        <input type="text" name="destination" placeholder="Destination" required>
        <input type="number" name="budget" placeholder="Budget" required>
        <button type="submit" class="btn btn-primary">Add Trip</button>
    </form>
    <div class="mt-5">
    <h3>Planned Trips</h3>
    <table class="table table-striped shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Destination</th>
                <th>Budget (₹)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for trip in trips %}
            <tr>
                <td>{{ trip.destination }}</td>
                <td>₹{{ trip.budget }}</td>
                <td><span class="badge bg-info">Upcoming</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

    <ul class="list-group">
        {% for trip in trips %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ trip.destination }}
                <span class="badge bg-success rounded-pill">₹{{ trip.budget }}</span>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
