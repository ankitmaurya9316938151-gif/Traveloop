<!DOCTYPE html>
<html>
<head>
    <title>Traveloop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-primary text-center mb-4">Traveloop ✈️</h1>
        
        <div class="card p-4 shadow-sm mb-4">
            <form action="/add_trip" method="POST" class="row g-3">
                <div class="col-md-6">
                    <input type="text" name="destination" class="form-control" placeholder="Where are you going?" required>
                </div>
                <div class="col-md-4">
                    <input type="number" name="budget" class="form-control" placeholder="Budget (₹)" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Add Trip</button>
                </div>
            </form>
        </div>

        <table class="table table-white table-hover shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Destination</th>
                    <th>Budget</th>
                    <th>Spent</th>
                    <th>Remaining</th>
                </tr>
            </thead>
            <tbody>
                {% for trip in trips %}
                <tr>
                    <td>{{ trip.destination }}</td>
                    <td>₹{{ trip.budget }}</td>
                    <td>₹{{ trip.spent }}</td>
                    <td class="fw-bold text-success">₹{{ trip.budget - trip.spent }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
