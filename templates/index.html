<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traveloop | Budget Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="text-center mb-4 text-primary">Traveloop Tracker ✈️</h1>

    <div class="card shadow-sm p-4 mb-5">
        <h4>Plan a New Trip</h4>
        <form action="/add_trip" method="POST" class="row g-3">
            <div class="col-md-6">
                <input type="text" name="destination" class="form-control" placeholder="Destination Name" required>
            </div>
            <div class="col-md-4">
                <input type="number" name="budget" class="form-control" placeholder="Total Budget (₹)" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Add Trip</button>
            </div>
        </form>
    </div>

    <div class="row">
        {% for trip in trips %}
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h3 class="card-title text-success">{{ trip.destination }}</h3>
                    <p class="mb-1 text-muted">Initial Budget: <strong>₹{{ trip.budget }}</strong></p>
                    <p class="mb-3">Remaining Balance: 
                        <span class="badge {% if trip.balance < 0 %}bg-danger{% else %}bg-success{% endif %} fs-6">
                            ₹{{ trip.balance }}
                        </span>
                    </p>

                    <form action="/add_expense/{{ trip.id }}" method="POST" class="input-group mb-3">
                        <input type="text" name="item" class="form-control form-control-sm" placeholder="Expense Item" required>
                        <input type="number" name="amount" class="form-control form-control-sm" placeholder="₹" required>
                        <button class="btn btn-outline-danger btn-sm" type="submit">Add Expense</button>
                    </form>

                    <ul class="list-group list-group-flush small">
                        {% for exp in trip.expenses %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            {{ exp.item }}
                            <span>₹{{ exp.amount }}</span>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
