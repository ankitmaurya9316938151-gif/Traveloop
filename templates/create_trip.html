{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Initiate New Trip</h4>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('create_trip') }}" method="POST">
                        
                        <div class="mb-3">
                            <label for="trip_name" class="form-label fw-bold">Trip Name</label>
                            <input type="text" class="form-control" id="trip_name" name="trip_name" placeholder="e.g. Summer Vacation" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="start_date" class="form-label fw-bold">Start Date</label>
                                <input type="date" class="form-control" id="start_date" name="start_date" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="end_date" class="form-label fw-bold">End Date</label>
                                <input type="date" class="form-control" id="end_date" name="end_date" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="destination" class="form-label fw-bold">Destination</label>
                            <input type="text" class="form-control" id="destination" name="destination" placeholder="Where are you going?">
                        </div>

                        <div class="mb-3">
                            <label for="budget" class="form-label fw-bold">Estimated Budget ($)</label>
                            <input type="number" class="form-control" id="budget" name="budget" placeholder="0.00" step="0.01">
                        </div>

                        <div class="mb-4">
                            <label for="notes" class="form-label fw-bold">Description (Optional)</label>
                            <textarea class="form-control" id="notes" name="notes" rows="4" placeholder="Any specific plans or reminders..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4">Save & Continue</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
